name: Packet Atlas Quality

on:
  push:
    branches: [main, work]
  pull_request:
    branches: [main, work]

jobs:
  quality:
    name: Build, test, lint and E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Scenario quality
        run: npm run scenario:lint
      - name: Capture fixture validation
        run: npm run capture:validate
      - name: Component inventory
        run: npm run component:inventory
      - name: Hygiene audit
        run: npm run hygiene:audit
      - name: Playwright E2E
        run: npm run e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
